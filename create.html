<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Booking - Abbey Flight</title>
  <link rel="stylesheet" href="create.css">
</head>
<body>
  <div class="container">
   
    <h1>Abbey Flight Booking</h1>
    <h3 class="location">Dublin, Ireland</h3>

  
    <div class="nav-buttons">
      <button onclick="location.href='create.html'">Create Booking</button>
      <button onclick="location.href='read.html'">View Bookings</button>
      <button onclick="location.href='update.html'">Update Booking</button>
      <button onclick="location.href='delete.html'">Delete Booking</button>
    </div>

    <div class="form-container">
      <form id="bookingForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <select id="gender" required>
          <option value="">Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
        <input type="number" id="age" placeholder="Age" min="0" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        <input type="text" id="journeyPlace" placeholder="Journey Place" required>
        <input type="date" id="journeyDate" required>
        <button type="submit">Add Booking</button>
      </form>
    </div>
  </div>

  <script src="create.js"></script>
</body>
</html>
